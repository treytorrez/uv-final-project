name: Deploy Executive Summary (Quarto) to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "docs/executive_summary/**"
      - "models/meta_*.json"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Generate Metrics Table
        run: |
          python docs/executive_summary/tools/generate_model_metrics_md.py

      - name: Render Site
        run: |
          quarto render docs/executive_summary
          touch docs/executive_summary/_site/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/executive_summary/_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
